name: Staging Release

on:
  workflow_dispatch:
  push:
    branches: ["develop"]

concurrency:
  group: staging-release
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Backend syntax + coverage
        working-directory: backend
        run: |
          cp .env.example .env
          npm run check:syntax
          npm run test:coverage

      - name: Setup Node (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend unit coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Frontend e2e smoke
        working-directory: frontend
        run: npm run e2e

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Upload staging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-artifacts
          path: |
            backend/src
            backend/scripts
            backend/package.json
            backend/package-lock.json
            frontend/dist
            scripts

  deploy-staging:
    name: Deploy To Staging
    runs-on: ubuntu-latest
    needs: quality
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip deploy when secrets are missing
        if: ${{ secrets.STAGING_SSH_HOST == '' || secrets.STAGING_SSH_USER == '' || secrets.STAGING_SSH_KEY == '' || secrets.STAGING_DEPLOY_PATH == '' }}
        run: echo "Staging deploy skipped. Configure STAGING_SSH_HOST, STAGING_SSH_USER, STAGING_SSH_KEY, STAGING_DEPLOY_PATH secrets."

      - name: Setup SSH agent
        if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_USER != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_DEPLOY_PATH != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add staging host to known_hosts
        if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_USER != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_DEPLOY_PATH != '' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Build deployment bundle
        if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_USER != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_DEPLOY_PATH != '' }}
        run: |
          tar -czf staging-bundle.tar.gz \
            backend/src \
            backend/scripts \
            backend/package.json \
            backend/package-lock.json \
            frontend/dist \
            scripts

      - name: Upload and extract bundle on staging
        if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_USER != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_DEPLOY_PATH != '' }}
        run: |
          scp staging-bundle.tar.gz "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/tmp/staging-bundle.tar.gz"
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "mkdir -p '${{ secrets.STAGING_DEPLOY_PATH }}' && tar -xzf /tmp/staging-bundle.tar.gz -C '${{ secrets.STAGING_DEPLOY_PATH }}'"

      - name: Post-deploy health check
        if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_USER != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_DEPLOY_PATH != '' && secrets.STAGING_HEALTHCHECK_URL != '' }}
        run: |
          curl --fail --show-error --silent "${{ secrets.STAGING_HEALTHCHECK_URL }}"

      - name: Skip post-deploy health check when URL is missing
        if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_USER != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_DEPLOY_PATH != '' && secrets.STAGING_HEALTHCHECK_URL == '' }}
        run: echo "Post-deploy health check skipped. Configure STAGING_HEALTHCHECK_URL secret."
